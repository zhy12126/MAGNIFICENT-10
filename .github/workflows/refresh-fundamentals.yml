name: Refresh company fundamentals

on:
  workflow_dispatch:
  schedule:
    # Saturday; the job below only runs the API refresh on the first Saturday.
    - cron: '15 01 * * 6'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether this is the first Saturday
        id: first-saturday
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%d)" -le 07 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.first-saturday.outputs.run == 'true'
      - uses: actions/setup-python@v5
        if: steps.first-saturday.outputs.run == 'true'
        with:
          python-version: '3.12'
      - run: python scripts/fetch_fundamentals.py
        if: steps.first-saturday.outputs.run == 'true'
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      - name: Commit refreshed fundamentals
        if: steps.first-saturday.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/data/fundamentals.json
          git diff --cached --quiet || git commit -m "chore: refresh company valuation inputs"
          git push
