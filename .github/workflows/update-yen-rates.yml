name: Update yen analysis data

on:
  schedule:
    # Run daily so expired calendar entries are removed on weekends as well.
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch official FX history and build attribution
        run: python scripts/fetch_yen_rates.py
      - name: Build reviewed official event calendar
        run: python scripts/build_yen_events.py
      - name: Commit yen snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/data/yen-rates.json outputs/data/yen-events.json
          git diff --cached --quiet || git commit -m "chore: update yen analysis snapshot"
          git push
