name: Backfill free valuation history

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Backfill historical valuation series from SEC EDGAR and Stooq
        env:
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
        run: python scripts/fetch_free_valuation_history.py
      - name: Commit historical valuation data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/data/history.json
          git diff --cached --quiet || git commit -m "chore: backfill free valuation history"
          git push
