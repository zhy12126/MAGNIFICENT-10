name: Update market data

on:
  schedule:
    # 每个美股交易日收盘后运行；UTC 22:30 = 美东夏令时 18:30
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch market data and SPY concentration
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python scripts/fetch_market_data.py
      - name: Commit daily snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/data/stocks.json outputs/data/history.json outputs/data/concentration.json
          git diff --cached --quiet || git commit -m "chore: update daily market snapshot"
          git push
